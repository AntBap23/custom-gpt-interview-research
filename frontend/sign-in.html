<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In | Qualitative AI Interview Studio</title>
    <link rel="stylesheet" href="/frontend/styles.css" />
  </head>
  <body data-page="sign-in">
    <div class="site-shell">
      <header class="site-header" data-site-header></header>

      <main class="page page--sign-in">
        <section class="auth-shell">
          <article class="panel-card panel-card--auth">
            <p class="eyebrow">Account Access</p>
            <h1>Sign in to access your research workspace.</h1>
            <p class="hero__lede">
              Use your Supabase Auth credentials. Sessions are persisted across refresh so authenticated users can
              return directly to their active workflow.
            </p>

            <div class="auth-mode-row">
              <button class="button button--secondary" type="button" id="auth-mode-sign-in">Sign in</button>
              <button class="button button--secondary" type="button" id="auth-mode-sign-up">Create account</button>
            </div>

            <form id="sign-in-form" class="stack-form">
              <label>
                Email
                <input type="email" name="email" placeholder="researcher@example.edu" required />
              </label>
              <label>
                Password
                <input type="password" name="password" placeholder="Password" required />
              </label>
              <button class="button button--primary" type="submit">Sign in</button>
            </form>

            <div id="sign-in-output" class="message-box">
              Enter your credentials to start a session.
            </div>
          </article>
        </section>
      </main>
    </div>

    <script src="/frontend/app.js" type="module"></script>
  </body>
</html>
